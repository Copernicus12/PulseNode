services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: pulsenode-web:latest
    container_name: pulsenode-web
    env_file:
      - .env
    ports:
      - "8080:8080"
    volumes:
      - sqlite-data:/var/www/html/database
      - storage-data:/var/www/html/storage
    restart: unless-stopped

  mqtt:
    build:
      context: .
      dockerfile: Dockerfile
    image: pulsenode-web:latest
    container_name: pulsenode-mqtt
    command: ["mqtt"]
    env_file:
      - .env
    volumes:
      - sqlite-data:/var/www/html/database
      - storage-data:/var/www/html/storage
    restart: unless-stopped

volumes:
  sqlite-data:
  storage-data:
